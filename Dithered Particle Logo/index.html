<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dithered Particle Logo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        gap: 24px;
      }

      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
        padding: 16px;
      }

      .controls label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 12px;
        color: #aaa;
      }

      .controls input[type="file"] {
        display: none;
      }

      .file-btn {
        padding: 10px 20px;
        background: #333;
        color: #fff;
        border: 1px solid #555;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.2s;
      }
      .file-btn:hover {
        background: #444;
      }

      .slider-group {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
        padding: 0 16px;
      }

      .slider-group label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 11px;
        color: #888;
        min-width: 100px;
      }

      .slider-group input[type="range"] {
        width: 100%;
        accent-color: #fff;
      }

      .logo-wrapper {
        position: relative;
        width: 240px;
        height: 240px;
      }

      .logo-wrapper canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      .hint {
        font-size: 12px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <label>
        <input type="file" id="fileInput" accept="image/*" />
        <span class="file-btn" id="fileBtn">Choose Image</span>
      </label>
    </div>

    <div class="slider-group">
      <label
        >Grid Size
        <input type="range" id="gridSize" min="50" max="400" value="200" /><span
          id="gridSizeVal"
          >200</span
        ></label
      >
      <label
        >Scale
        <input type="range" id="scale" min="10" max="100" value="50" /><span
          id="scaleVal"
          >0.5</span
        ></label
      >
      <label
        >Dot Scale
        <input type="range" id="dotScale" min="20" max="300" value="100" /><span
          id="dotScaleVal"
          >1.0</span
        ></label
      >
      <label
        >Threshold
        <input type="range" id="threshold" min="0" max="255" value="180" /><span
          id="thresholdVal"
          >180</span
        ></label
      >
      <label
        >Contrast
        <input type="range" id="contrast" min="-128" max="128" value="0" /><span
          id="contrastVal"
          >0</span
        ></label
      >
      <label
        >Gamma
        <input type="range" id="gamma" min="10" max="400" value="100" /><span
          id="gammaVal"
          >1.0</span
        ></label
      >
      <label
        >Blur
        <input type="range" id="blur" min="0" max="150" value="375" /><span
          id="blurVal"
          >3.75</span
        ></label
      >
      <label
        >Diffusion
        <input type="range" id="diffusion" min="0" max="200" value="100" /><span
          id="diffusionVal"
          >1.0</span
        ></label
      >
      <label
        >Corner R%
        <input
          type="range"
          id="cornerRadius"
          min="0"
          max="50"
          value="20"
        /><span id="cornerRadiusVal">0.2</span></label
      >
    </div>

    <div
      style="
        display: flex;
        gap: 16px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
      "
    >
      <label
        style="
          font-size: 12px;
          color: #888;
          display: flex;
          align-items: center;
          gap: 6px;
        "
      >
        <input type="checkbox" id="invert" checked /> Invert
      </label>
      <label
        style="
          font-size: 12px;
          color: #888;
          display: flex;
          align-items: center;
          gap: 6px;
        "
      >
        <input type="checkbox" id="serpentine" checked /> Serpentine
      </label>
    </div>

    <div class="logo-wrapper" id="logoWrapper">
      <canvas id="canvas"></canvas>
    </div>

    <p class="hint">Hover to push particles · Click to create ripples</p>

    <script>
      (function () {
        "use strict";

        /* ─── defaults ─── */
        const RIPPLE_SPEED = 225;
        const RIPPLE_WIDTH = 37;
        const RIPPLE_FORCE = 20;
        const RIPPLE_DURATION = 675;
        const CURSOR_RADIUS = 100;
        const CURSOR_RADIUS_SQ = CURSOR_RADIUS * CURSOR_RADIUS;
        const CURSOR_FORCE = 40;
        const LERP_FACTOR = 0.12;
        const SNAP_THRESHOLD = 0.01;

        /* ─── state ─── */
        let system = null;
        let ripples = [];
        let running = false;
        let animId = 0;
        let imageSrc = "";
        let imageObj = null;

        const cursor = { x: 0, y: 0, active: false };

        /* ─── DOM refs ─── */
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const wrapper = document.getElementById("logoWrapper");
        const fileInput = document.getElementById("fileInput");
        const fileBtn = document.getElementById("fileBtn");

        /* slider elements */
        const sliders = {
          gridSize: {
            el: document.getElementById("gridSize"),
            valEl: document.getElementById("gridSizeVal"),
            div: 1,
            fmt: (v) => v,
          },
          scale: {
            el: document.getElementById("scale"),
            valEl: document.getElementById("scaleVal"),
            div: 100,
            fmt: (v) => v.toFixed(2),
          },
          dotScale: {
            el: document.getElementById("dotScale"),
            valEl: document.getElementById("dotScaleVal"),
            div: 100,
            fmt: (v) => v.toFixed(1),
          },
          threshold: {
            el: document.getElementById("threshold"),
            valEl: document.getElementById("thresholdVal"),
            div: 1,
            fmt: (v) => v,
          },
          contrast: {
            el: document.getElementById("contrast"),
            valEl: document.getElementById("contrastVal"),
            div: 1,
            fmt: (v) => v,
          },
          gamma: {
            el: document.getElementById("gamma"),
            valEl: document.getElementById("gammaVal"),
            div: 100,
            fmt: (v) => v.toFixed(2),
          },
          blur: {
            el: document.getElementById("blur"),
            valEl: document.getElementById("blurVal"),
            div: 100,
            fmt: (v) => v.toFixed(2),
          },
          diffusion: {
            el: document.getElementById("diffusion"),
            valEl: document.getElementById("diffusionVal"),
            div: 100,
            fmt: (v) => v.toFixed(2),
          },
          cornerRadius: {
            el: document.getElementById("cornerRadius"),
            valEl: document.getElementById("cornerRadiusVal"),
            div: 100,
            fmt: (v) => v.toFixed(2),
          },
        };

        const invertCb = document.getElementById("invert");
        const serpentCb = document.getElementById("serpentine");

        function getConfig() {
          return {
            gridSize: parseInt(sliders.gridSize.el.value),
            scale: parseInt(sliders.scale.el.value) / 100,
            dotScale: parseInt(sliders.dotScale.el.value) / 100,
            threshold: parseInt(sliders.threshold.el.value),
            contrast: parseInt(sliders.contrast.el.value),
            gamma: parseInt(sliders.gamma.el.value) / 100,
            blur: parseInt(sliders.blur.el.value) / 100,
            diffusionStrength: parseInt(sliders.diffusion.el.value) / 100,
            cornerRadius: parseInt(sliders.cornerRadius.el.value) / 100,
            invert: invertCb.checked,
            serpentine: serpentCb.checked,
          };
        }

        /* ─── update slider labels ─── */
        Object.values(sliders).forEach((s) => {
          const update = () => {
            const raw = parseInt(s.el.value);
            s.valEl.textContent = s.fmt(raw / s.div);
          };
          s.el.addEventListener("input", update);
          update();
        });

        /* ─── file input ─── */
        fileBtn.addEventListener("click", () => fileInput.click());
        fileInput.addEventListener("change", () => {
          const file = fileInput.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            imageSrc = e.target.result;
            const img = new Image();
            img.onload = () => {
              imageObj = img;
              rebuild();
            };
            img.src = imageSrc;
          };
          reader.readAsDataURL(file);
        });

        /* attach slider / checkbox change to rebuild */
        Object.values(sliders).forEach((s) =>
          s.el.addEventListener("input", () => {
            if (imageObj) rebuild();
          }),
        );
        invertCb.addEventListener("change", () => {
          if (imageObj) rebuild();
        });
        serpentCb.addEventListener("change", () => {
          if (imageObj) rebuild();
        });

        /* ─── image processing ─── */
        function toGrayscaleGrid(img, maxDim, contrast, gamma, blur) {
          const aspect = img.naturalWidth / img.naturalHeight;
          const outW = aspect >= 1 ? maxDim : Math.round(maxDim * aspect);
          const outH = aspect >= 1 ? Math.round(maxDim / aspect) : maxDim;
          const srcW = img.naturalWidth;
          const srcH = img.naturalHeight;

          /* alpha channel from sharp downscale */
          const alphaCanvas = document.createElement("canvas");
          alphaCanvas.width = outW;
          alphaCanvas.height = outH;
          const alphaCtx = alphaCanvas.getContext("2d");
          alphaCtx.imageSmoothingEnabled = true;
          alphaCtx.imageSmoothingQuality = "high";
          alphaCtx.drawImage(img, 0, 0, outW, outH);
          const alphaData = alphaCtx.getImageData(0, 0, outW, outH).data;

          /* blurred source */
          const pad = Math.ceil(blur * 3);
          const srcCanvas = document.createElement("canvas");
          srcCanvas.width = srcW + pad * 2;
          srcCanvas.height = srcH + pad * 2;
          const srcCtx = srcCanvas.getContext("2d");
          if (blur > 0) srcCtx.filter = "blur(" + blur + "px)";
          srcCtx.drawImage(img, pad, pad, srcW, srcH);
          srcCtx.filter = "none";

          /* downscale blurred */
          const canvas2 = document.createElement("canvas");
          canvas2.width = outW;
          canvas2.height = outH;
          const ctx2 = canvas2.getContext("2d");
          ctx2.imageSmoothingEnabled = true;
          ctx2.imageSmoothingQuality = "high";
          ctx2.drawImage(srcCanvas, pad, pad, srcW, srcH, 0, 0, outW, outH);

          const pixels = ctx2.getImageData(0, 0, outW, outH).data;
          const grayscale = new Uint8Array(outW * outH);
          const alpha = new Uint8Array(outW * outH);
          const cFactor = (259 * (contrast + 255)) / (255 * (259 - contrast));

          for (let y = 0; y < outH; y++) {
            for (let x = 0; x < outW; x++) {
              const idx = (y * outW + x) * 4;
              const blurAlpha = pixels[idx + 3] / 255;
              alpha[y * outW + x] = alphaData[idx + 3];

              let luma =
                blurAlpha > 0.01
                  ? (0.299 * pixels[idx] +
                      0.587 * pixels[idx + 1] +
                      0.114 * pixels[idx + 2]) /
                    blurAlpha
                  : 0;

              if (contrast !== 0) luma = cFactor * (luma - 128) + 128;
              if (gamma !== 1)
                luma = 255 * Math.pow(Math.max(0, luma / 255), 1 / gamma);

              grayscale[y * outW + x] = Math.max(
                0,
                Math.min(255, Math.round(luma)),
              );
            }
          }

          return { grayscale, alpha, width: outW, height: outH };
        }

        function errorDiffusionDither(grayscale, width, height, config, alpha) {
          const errors = new Float32Array(width * height);
          for (let i = 0; i < grayscale.length; i++) errors[i] = grayscale[i];

          const positions = [];
          const strength = config.diffusionStrength;

          for (let y = 0; y < height; y++) {
            const ltr = !config.serpentine || y % 2 === 0;
            const startX = ltr ? 0 : width - 1;
            const endX = ltr ? width : -1;
            const step = ltr ? 1 : -1;

            for (let x = startX; x !== endX; x += step) {
              const idx = y * width + x;
              if (alpha[idx] < 128) continue;

              const oldVal = errors[idx];
              const newVal = oldVal > config.threshold ? 255 : 0;
              const err = (oldVal - newVal) * strength;

              if (newVal > 0) positions.push(x, y);

              const spread = (nx, ny, weight) => {
                if (nx < 0 || nx >= width || ny < 0 || ny >= height) return;
                const ni = ny * width + nx;
                if (alpha[ni] < 128) return;
                errors[ni] = errors[ni] + err * weight;
              };

              spread(x + step, y, 7 / 16);
              spread(x - step, y + 1, 3 / 16);
              spread(x, y + 1, 5 / 16);
              spread(x + step, y + 1, 1 / 16);
            }
          }

          return new Float32Array(positions);
        }

        function buildRoundedMask(w, h, radiusPct) {
          const r = Math.round(radiusPct * Math.min(w, h));
          const mask = new Set();
          for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
              let inside = false;
              if (x >= r && x < w - r) inside = true;
              else if (y >= r && y < h - r) inside = true;
              else {
                const cx = x < r ? r : w - r - 1;
                const cy = y < r ? r : h - r - 1;
                const dx = x - cx,
                  dy = y - cy;
                inside = dx * dx + dy * dy <= r * r;
              }
              if (inside) mask.add(y * w + x);
            }
          }
          return mask;
        }

        function applyMaskInversion(positions, gridW, gridH, radiusPct, alpha) {
          const mask = buildRoundedMask(gridW, gridH, radiusPct);
          const filled = new Set();
          for (let i = 0; i < positions.length; i += 2) {
            filled.add(
              Math.round(positions[i + 1]) * gridW + Math.round(positions[i]),
            );
          }
          const result = [];
          for (const idx of mask) {
            if (!filled.has(idx)) {
              if (alpha[idx] < 128) continue;
              result.push(idx % gridW, Math.floor(idx / gridW));
            }
          }
          return new Float32Array(result);
        }

        /* ─── particle system ─── */
        function initParticles(
          points,
          scaleFactor,
          dotScale,
          originX,
          originY,
        ) {
          const count = points.length / 2;
          const baseX = new Float32Array(count);
          const baseY = new Float32Array(count);
          const offsetX = new Float32Array(count);
          const offsetY = new Float32Array(count);
          const brightness = new Float32Array(count);
          const tint = new Float32Array(count);

          for (let i = 0; i < count; i++) {
            baseX[i] = originX + points[i * 2] * scaleFactor;
            baseY[i] = originY + points[i * 2 + 1] * scaleFactor;
            brightness[i] = 1;
            tint[i] = 1;
          }

          return {
            count,
            baseX,
            baseY,
            offsetX,
            offsetY,
            brightness,
            tint,
            size: scaleFactor * dotScale,
          };
        }

        function stepParticles(sys, cx, cy, cActive, rips, now) {
          const { count, baseX, baseY, offsetX, offsetY } = sys;

          for (let k = rips.length - 1; k >= 0; k--) {
            if (now - rips[k].start >= RIPPLE_DURATION) rips.splice(k, 1);
          }

          const numRipples = rips.length;
          const rippleMul = numRipples > 0 ? 1 + 0.5 * (numRipples - 1) : 0;
          let hasMotion = false;

          for (let i = 0; i < count; i++) {
            let fx = 0,
              fy = 0;

            if (cActive) {
              const vx = baseX[i] + offsetX[i] - cx;
              const vy = baseY[i] + offsetY[i] - cy;
              const d2 = vx * vx + vy * vy;
              if (d2 > 0.1 && d2 < CURSOR_RADIUS_SQ) {
                const d = Math.sqrt(d2);
                const f = Math.pow(1 - d / CURSOR_RADIUS, 3) * CURSOR_FORCE;
                fx += (vx / d) * f;
                fy += (vy / d) * f;
              }
            }

            for (let k = 0; k < numRipples; k++) {
              const r = rips[k];
              const elapsed = now - r.start;
              const radius = (elapsed / 1000) * RIPPLE_SPEED;
              const life = 1 - elapsed / RIPPLE_DURATION;
              const sx = baseX[i] - r.x;
              const sy = baseY[i] - r.y;
              const d = Math.sqrt(sx * sx + sy * sy);
              if (d < 0.1) continue;
              const band = Math.abs(d - radius);
              if (band < RIPPLE_WIDTH) {
                const wf =
                  (1 - band / RIPPLE_WIDTH) * life * RIPPLE_FORCE * rippleMul;
                fx += (sx / d) * wf;
                fy += (sy / d) * wf;
              }
            }

            offsetX[i] = offsetX[i] + (fx - offsetX[i]) * LERP_FACTOR;
            offsetY[i] = offsetY[i] + (fy - offsetY[i]) * LERP_FACTOR;
            if (Math.abs(offsetX[i]) < SNAP_THRESHOLD) offsetX[i] = 0;
            if (Math.abs(offsetY[i]) < SNAP_THRESHOLD) offsetY[i] = 0;
            if (offsetX[i] !== 0 || offsetY[i] !== 0) hasMotion = true;
          }

          return hasMotion || numRipples > 0 || cActive;
        }

        function drawParticles(ctx, sys, particleColor, canvasW, canvasH, dpr) {
          ctx.clearRect(0, 0, canvasW * dpr, canvasH * dpr);

          const buckets = new Array(126);
          for (let i = 0; i < 126; i++) buckets[i] = [];

          for (let i = 0; i < sys.count; i++) {
            const bucket =
              6 * Math.round(20 * sys.brightness[i]) +
              Math.round(5 * sys.tint[i]);
            buckets[Math.max(0, Math.min(125, bucket))].push(i);
          }

          const size = sys.size * dpr;
          const pad = 0.25 * dpr;
          const padSize = 0.5 * dpr;

          for (let z = 0; z < 126; z++) {
            const ids = buckets[z];
            if (ids.length === 0) continue;
            const alpha = Math.floor(z / 6) / 20;
            ctx.fillStyle = particleColor;
            ctx.globalAlpha = alpha;

            for (let j = 0; j < ids.length; j++) {
              const i = ids[j];
              const rx = (sys.baseX[i] + sys.offsetX[i]) * dpr;
              const ry = (sys.baseY[i] + sys.offsetY[i]) * dpr;
              ctx.fillRect(rx - pad, ry - pad, size + padSize, size + padSize);
            }
          }
          ctx.globalAlpha = 1;
        }

        /* ─── rebuild ─── */
        function rebuild() {
          if (!imageObj || !imageSrc) return;

          const cfg = getConfig();
          const rect = wrapper.getBoundingClientRect();

          const processed = toGrayscaleGrid(
            imageObj,
            cfg.gridSize,
            cfg.contrast,
            cfg.gamma,
            cfg.blur,
          );
          const { width: gridW, height: gridH } = processed;

          let positions = errorDiffusionDither(
            processed.grayscale,
            gridW,
            gridH,
            {
              threshold: cfg.threshold,
              serpentine: cfg.serpentine,
              diffusionStrength: cfg.diffusionStrength,
            },
            processed.alpha,
          );

          if (cfg.invert) {
            positions = applyMaskInversion(
              positions,
              gridW,
              gridH,
              cfg.cornerRadius,
              processed.alpha,
            );
          }

          const scaleFactor = Math.max(
            0.5,
            (Math.min(rect.width, rect.height) * cfg.scale) /
              Math.max(gridW, gridH),
          );
          const originX = Math.round((rect.width - gridW * scaleFactor) / 2);
          const originY = Math.round((rect.height - gridH * scaleFactor) / 2);
          const isMobile = window.matchMedia("(max-width: 640px)").matches;
          const respDot = isMobile ? cfg.dotScale * 0.8 : cfg.dotScale;

          system = initParticles(
            positions,
            scaleFactor,
            respDot,
            originX,
            originY,
          );
          startLoop();
        }

        /* ─── animation loop ─── */
        function getParticleColor() {
          return getComputedStyle(document.body).color;
        }

        function startLoop() {
          if (running) return;
          running = true;

          const tick = () => {
            if (!system) {
              running = false;
              return;
            }

            const dpr = window.devicePixelRatio || 1;
            const rect = wrapper.getBoundingClientRect();

            const needsMore = stepParticles(
              system,
              cursor.x,
              cursor.y,
              cursor.active,
              ripples,
              performance.now(),
            );

            drawParticles(
              ctx,
              system,
              getParticleColor(),
              rect.width,
              rect.height,
              dpr,
            );

            if (needsMore) {
              animId = requestAnimationFrame(tick);
            } else {
              running = false;
            }
          };

          animId = requestAnimationFrame(tick);
        }

        /* ─── canvas sizing ─── */
        function handleResize() {
          const dpr = window.devicePixelRatio || 1;
          const rect = wrapper.getBoundingClientRect();
          canvas.width = Math.max(1, Math.round(rect.width * dpr));
          canvas.height = Math.max(1, Math.round(rect.height * dpr));

          if (system) {
            drawParticles(
              ctx,
              system,
              getParticleColor(),
              rect.width,
              rect.height,
              dpr,
            );
          }
        }

        /* ─── pointer events ─── */
        canvas.addEventListener("pointermove", (e) => {
          const rect = wrapper.getBoundingClientRect();
          cursor.x = e.clientX - rect.left;
          cursor.y = e.clientY - rect.top;
          cursor.active = true;
          startLoop();
        });

        canvas.addEventListener("pointerleave", (e) => {
          if (e.pointerType !== "mouse") return;
          cursor.active = false;
          startLoop();
        });

        canvas.addEventListener("pointercancel", () => {
          cursor.active = false;
          startLoop();
        });

        canvas.addEventListener("pointerup", (e) => {
          const rect = wrapper.getBoundingClientRect();
          ripples.push({
            x: e.clientX - rect.left,
            y: e.clientY - rect.top,
            start: performance.now(),
          });
          if (e.pointerType !== "mouse") cursor.active = false;
          startLoop();
        });

        /* ─── resize observer ─── */
        let resizeTimer = null;
        const ro = new ResizeObserver(() => {
          handleResize();
          if (resizeTimer) clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            if (imageObj) rebuild();
          }, 200);
        });
        ro.observe(wrapper);

        /* ─── theme change ─── */
        new MutationObserver(() => handleResize()).observe(
          document.documentElement,
          { attributes: true, attributeFilter: ["class", "style"] },
        );

        /* ─── initial resize ─── */
        handleResize();

        /* ─── load a default demo image ─── */
        (function loadDefault() {
          /* Draws a simple "M" letter as a default logo so something is visible immediately */
          const c = document.createElement("canvas");
          c.width = 200;
          c.height = 200;
          const cx = c.getContext("2d");
          cx.fillStyle = "#fff";
          cx.font = "bold 160px Georgia";
          cx.textAlign = "center";
          cx.textBaseline = "middle";
          cx.fillText("M", 100, 110);
          const img = new Image();
          img.onload = () => {
            imageObj = img;
            imageSrc = c.toDataURL();
            rebuild();
          };
          img.src = c.toDataURL();
        })();
      })();
    </script>
  </body>
</html>
