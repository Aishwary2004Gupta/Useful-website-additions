<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dithered Particle Logo</title>

    <script>
      (function () {
        var t = localStorage.getItem("dp-theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
        else if (
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches
        )
          document.documentElement.setAttribute("data-theme", "dark");
      })();
    </script>

    <style>
      :root,
      [data-theme="light"] {
        --particle: #111111;
        --bg: #f5f5f0;
        --bg-spot: rgba(255, 255, 255, 0.55);
        --surface: #ffffff;
        --surface-hover: #f2f2ef;
        --border: #e0e0dd;
        --text: #1a1a1a;
        --text-sub: #999;
        --shadow: 0 2px 10px rgba(0, 0, 0, 0.06);
        --shadow-up: 0 6px 20px rgba(0, 0, 0, 0.1);
      }
      [data-theme="dark"] {
        --particle: #e2e2e2;
        --bg: #0a0a0a;
        --bg-spot: rgba(30, 30, 30, 0.6);
        --surface: #161616;
        --surface-hover: #1e1e1e;
        --border: #2a2a2a;
        --text: #e2e2e2;
        --text-sub: #555;
        --shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        --shadow-up: 0 6px 20px rgba(0, 0, 0, 0.4);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background-color: var(--bg);
        background-image: radial-gradient(
          ellipse at 50% 32%,
          var(--bg-spot),
          transparent 68%
        );
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
        transition:
          background-color 0.5s ease,
          color 0.4s ease;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Theme toggle ── */
      .theme-toggle {
        position: fixed;
        top: 18px;
        right: 18px;
        z-index: 100;
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        box-shadow: var(--shadow);
        transition: all 0.25s ease;
      }
      .theme-toggle:hover {
        background: var(--surface-hover);
        box-shadow: var(--shadow-up);
        transform: scale(1.06);
      }
      .theme-toggle:active {
        transform: scale(0.94);
      }
      .theme-toggle svg {
        width: 20px;
        height: 20px;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      [data-theme="dark"] .theme-toggle svg {
        transform: rotate(180deg);
      }
      .theme-toggle .moon {
        display: block;
      }
      .theme-toggle .sun {
        display: none;
      }
      [data-theme="dark"] .theme-toggle .moon {
        display: none;
      }
      [data-theme="dark"] .theme-toggle .sun {
        display: block;
      }

      /* ── Layout ── */
      .demo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .dithered-logo {
        position: relative;
        width: 440px;
        height: 440px;
        color: var(--particle);
      }
      .dithered-logo canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
        cursor: pointer;
      }

      /* ── Controls ── */
      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 9px 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        box-shadow: var(--shadow);
        transition: all 0.22s ease;
        user-select: none;
        -webkit-user-select: none;
      }
      .btn:hover {
        background: var(--surface-hover);
        box-shadow: var(--shadow-up);
        transform: translateY(-1px);
      }
      .btn:active {
        transform: translateY(0);
      }
      .btn input {
        display: none;
      }
      .btn svg {
        width: 14px;
        height: 14px;
        opacity: 0.5;
        flex-shrink: 0;
      }

      .btn.active {
        border-color: var(--text);
        background: var(--text);
        color: var(--bg);
      }
      .btn.active svg {
        opacity: 0.85;
      }

      .divider {
        width: 1px;
        height: 28px;
        background: var(--border);
        margin: 0 4px;
      }

      .hint {
        font-size: 12px;
        color: var(--text-sub);
        letter-spacing: 0.02em;
        transition: color 0.4s ease;
      }

      @media (max-width: 640px) {
        .dithered-logo {
          width: min(86vw, 350px);
          height: min(86vw, 350px);
        }
        .theme-toggle {
          top: 12px;
          right: 12px;
          width: 40px;
          height: 40px;
        }
        .btn {
          padding: 8px 13px;
          font-size: 12.5px;
        }
      }
    </style>
  </head>

  <body>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <svg
        class="moon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
      <svg
        class="sun"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
    </button>

    <main class="demo">
      <div class="dithered-logo" id="ditheredLogo">
        <canvas id="particleCanvas"></canvas>
      </div>

      <div class="controls">
        <label class="btn" id="uploadBtn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Upload
          <input type="file" id="imagePicker" accept="image/*" />
        </label>

        <div class="divider"></div>

        <button class="btn active" id="bwBtn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M12 2a10 10 0 0 1 0 20z" fill="currentColor" />
          </svg>
          B&amp;W
        </button>

        <button class="btn" id="colorBtn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="13.5" cy="6.5" r="2.5" />
            <circle cx="17.5" cy="10.5" r="2.5" />
            <circle cx="8.5" cy="7.5" r="2.5" />
            <circle cx="6.5" cy="12" r="2.5" />
            <path
              d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.5-.7 1.5-1.5 0-.4-.1-.7-.4-1-.2-.3-.4-.6-.4-1 0-.8.7-1.5 1.5-1.5H16c3.3 0 6-2.7 6-6 0-5.5-4.5-9-10-9z"
            />
          </svg>
          Color
        </button>
      </div>

      <p class="hint">Hover &amp; click to interact with particles</p>
    </main>

    <script>
      /* ═══════ Constants ═══════ */
      const RIPPLE_SPEED = 225;
      const RIPPLE_WIDTH = 37;
      const RIPPLE_FORCE = 20;
      const RIPPLE_DURATION = 675;
      const CURSOR_RADIUS = 100;
      const CURSOR_RADIUS_SQ = CURSOR_RADIUS * CURSOR_RADIUS;
      const CURSOR_FORCE = 40;
      const LERP = 0.12;
      const SNAP = 0.01;

      /* ═══════ Demo image ═══════ */
      function createDemoImage() {
        return "https://raw.githubusercontent.com/Aishwary2004Gupta/models/cloud/images/Background.png";
      }

      /* ═══════ DitheredLogo ═══════ */
      class DitheredLogo {
        constructor(container, imageSrc, config = {}) {
          this.el = container;
          this.cv = container.querySelector("canvas");
          this.cx = this.cv.getContext("2d");
          this.cfg = {
            gridSize: 270,
            scale: 0.86,
            dotScale: 0.9,
            invert: true,
            cornerRadius: 0.16,
            threshold: 168,
            contrast: 14,
            gamma: 1.04,
            blur: 1.15,
            diffusionStrength: 1,
            serpentine: true,
            particleColor: "currentColor",
            ...config,
          };
          this.src = imageSrc;
          this.sys = null;
          this.monochrome = true;
          this.cursor = { x: 0, y: 0, on: false };
          this.ripples = [];
          this.raf = 0;
          this.running = false;
          this.lw = 0;
          this.lh = 0;
          this.resizeTimer = null;

          this.ro = new ResizeObserver(() => this._resize());
          this.ro.observe(this.el);

          this.mo = new MutationObserver(() => {
            requestAnimationFrame(() => {
              if (this.sys) this._draw();
            });
          });
          this.mo.observe(document.documentElement, {
            attributes: true,
            attributeFilter: ["data-theme", "class", "style"],
          });

          this._bind();
          this._resize();
          this.rebuild();
        }

        /* ── Pointer events ── */
        _bind() {
          const c = this.cv;
          c.addEventListener("pointermove", (e) => {
            const r = c.getBoundingClientRect();
            this.cursor.x = e.clientX - r.left;
            this.cursor.y = e.clientY - r.top;
            this.cursor.on = true;
            this._loop();
          });
          c.addEventListener("pointerleave", (e) => {
            if (e.pointerType === "mouse") {
              this.cursor.on = false;
              this._loop();
            }
          });
          c.addEventListener("pointercancel", () => {
            this.cursor.on = false;
            this._loop();
          });
          c.addEventListener("pointerup", (e) => {
            const r = c.getBoundingClientRect();
            this.ripples.push({
              x: e.clientX - r.left,
              y: e.clientY - r.top,
              t: performance.now(),
            });
            if (e.pointerType !== "mouse") this.cursor.on = false;
            this._loop();
          });
        }

        /* ── Toggle monochrome / color ── */
        setColorMode(useColor) {
          this.monochrome = !useColor;
          if (this.sys) {
            this._draw();
            this._loop();
          }
        }

        /* ── Image loader ── */
        _img(src) {
          return new Promise((ok, no) => {
            const i = new Image();
            i.crossOrigin = "anonymous";
            i.onload = () => ok(i);
            i.onerror = no;
            i.src = src;
          });
        }

        /* ── Grayscale grid + original colors ── */
        _gray(img) {
          const C = this.cfg;
          const asp = img.naturalWidth / img.naturalHeight;
          const w = asp >= 1 ? C.gridSize : Math.round(C.gridSize * asp);
          const h = asp >= 1 ? Math.round(C.gridSize / asp) : C.gridSize;

          /* Original (no blur) for alpha + color */
          const ac = document.createElement("canvas");
          ac.width = w;
          ac.height = h;
          const ax = ac.getContext("2d");
          ax.imageSmoothingEnabled = true;
          ax.imageSmoothingQuality = "high";
          ax.drawImage(img, 0, 0, w, h);
          const ad = ax.getImageData(0, 0, w, h).data;

          /* Blurred source for luminance */
          const pad = Math.ceil(C.blur * 3);
          const sc = document.createElement("canvas");
          sc.width = img.naturalWidth + pad * 2;
          sc.height = img.naturalHeight + pad * 2;
          const sx = sc.getContext("2d");
          if (C.blur > 0) sx.filter = `blur(${C.blur}px)`;
          sx.drawImage(img, pad, pad, img.naturalWidth, img.naturalHeight);
          sx.filter = "none";

          const fc = document.createElement("canvas");
          fc.width = w;
          fc.height = h;
          const fx = fc.getContext("2d");
          fx.imageSmoothingEnabled = true;
          fx.imageSmoothingQuality = "high";
          fx.drawImage(
            sc,
            pad,
            pad,
            img.naturalWidth,
            img.naturalHeight,
            0,
            0,
            w,
            h,
          );
          const px = fx.getImageData(0, 0, w, h).data;

          const gs = new Uint8Array(w * h);
          const alpha = new Uint8Array(w * h);
          const colors = new Uint8Array(w * h * 3);
          const cf = (259 * (C.contrast + 255)) / (255 * (259 - C.contrast));

          for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
              const pi = (y * w + x) * 4;
              const idx = y * w + x;
              const ba = px[pi + 3] / 255;

              alpha[idx] = ad[pi + 3];

              /* Store original RGB from non-blurred image */
              colors[idx * 3] = ad[pi];
              colors[idx * 3 + 1] = ad[pi + 1];
              colors[idx * 3 + 2] = ad[pi + 2];

              let l =
                ba > 0.01
                  ? (0.299 * px[pi] + 0.587 * px[pi + 1] + 0.114 * px[pi + 2]) /
                    ba
                  : 0;

              if (C.contrast) l = cf * (l - 128) + 128;
              if (C.gamma !== 1)
                l = 255 * Math.pow(Math.max(0, l / 255), 1 / C.gamma);

              gs[idx] = Math.max(0, Math.min(255, Math.round(l)));
            }
          }

          return { gs, alpha, colors, w, h };
        }

        /* ── Floyd-Steinberg dithering ── */
        _dither(g) {
          const C = this.cfg;
          const { gs, alpha, w, h } = g;
          const err = new Float32Array(w * h);
          for (let i = 0; i < gs.length; i++) err[i] = gs[i];
          const pos = [];

          for (let y = 0; y < h; y++) {
            const ltr = !C.serpentine || y % 2 === 0;
            const sx = ltr ? 0 : w - 1;
            const ex = ltr ? w : -1;
            const st = ltr ? 1 : -1;

            for (let x = sx; x !== ex; x += st) {
              const idx = y * w + x;
              if (alpha[idx] < 128) continue;

              const ov = err[idx];
              const nv = ov > C.threshold ? 255 : 0;
              const e = (ov - nv) * C.diffusionStrength;
              if (nv > 0) pos.push(x, y);

              const sp = (nx, ny, wt) => {
                if (nx < 0 || nx >= w || ny < 0 || ny >= h) return;
                const ni = ny * w + nx;
                if (alpha[ni] < 128) return;
                err[ni] += e * wt;
              };

              sp(x + st, y, 7 / 16);
              sp(x - st, y + 1, 3 / 16);
              sp(x, y + 1, 5 / 16);
              sp(x + st, y + 1, 1 / 16);
            }
          }
          return new Float32Array(pos);
        }

        /* ── Rounded mask inversion ── */
        _invert(pts, w, h, alpha) {
          const r = Math.round(this.cfg.cornerRadius * Math.min(w, h));
          const mask = new Set();

          for (let y = 0; y < h; y++)
            for (let x = 0; x < w; x++) {
              let ok = false;
              if (x >= r && x < w - r) ok = true;
              else if (y >= r && y < h - r) ok = true;
              else {
                const cx = x < r ? r : w - r - 1;
                const cy = y < r ? r : h - r - 1;
                ok = (x - cx) ** 2 + (y - cy) ** 2 <= r * r;
              }
              if (ok) mask.add(y * w + x);
            }

          const filled = new Set();
          for (let i = 0; i < pts.length; i += 2)
            filled.add(Math.round(pts[i + 1]) * w + Math.round(pts[i]));

          const out = [];
          for (const idx of mask)
            if (!filled.has(idx) && alpha[idx] >= 128)
              out.push(idx % w, Math.floor(idx / w));

          return new Float32Array(out);
        }

        /* ── Extract per-particle colors from grid ── */
        _extractColors(positions, gridColors, gridW) {
          const count = positions.length / 2;
          const pColors = new Uint8Array(count * 3);

          for (let i = 0; i < count; i++) {
            const px = Math.round(positions[i * 2]);
            const py = Math.round(positions[i * 2 + 1]);
            const srcIdx = py * gridW + px;

            pColors[i * 3] = gridColors[srcIdx * 3];
            pColors[i * 3 + 1] = gridColors[srcIdx * 3 + 1];
            pColors[i * 3 + 2] = gridColors[srcIdx * 3 + 2];
          }
          return pColors;
        }

        /* ── Build color buckets for batched rendering ── */
        _buildColorBuckets(pColors, count) {
          const bucketMap = {};

          for (let i = 0; i < count; i++) {
            const r = pColors[i * 3];
            const g = pColors[i * 3 + 1];
            const b = pColors[i * 3 + 2];

            /* Quantize to 5 bits per channel (32 levels, ~1.6% error) */
            const qr = r >> 3;
            const qg = g >> 3;
            const qb = b >> 3;
            const key = (qr << 10) | (qg << 5) | qb;

            if (!bucketMap[key]) {
              bucketMap[key] = {
                css:
                  "rgb(" +
                  ((qr << 3) | 4) +
                  "," +
                  ((qg << 3) | 4) +
                  "," +
                  ((qb << 3) | 4) +
                  ")",
                ids: [],
              };
            }
            bucketMap[key].ids.push(i);
          }

          return Object.values(bucketMap);
        }

        /* ── Init particle system ── */
        _initParticles(positions, sf, ds, ox, oy, pColors) {
          const n = positions.length / 2;
          const bx = new Float32Array(n);
          const by = new Float32Array(n);

          for (let i = 0; i < n; i++) {
            bx[i] = ox + positions[i * 2] * sf;
            by[i] = oy + positions[i * 2 + 1] * sf;
          }

          return {
            n,
            bx,
            by,
            ox: new Float32Array(n),
            oy: new Float32Array(n),
            sz: sf * ds,
            colorBuckets: this._buildColorBuckets(pColors, n),
          };
        }

        /* ── Rebuild pipeline ── */
        async rebuild(newSrc) {
          if (newSrc) this.src = newSrc;

          try {
            const img = await this._img(this.src);
            const rect = this.cv.getBoundingClientRect();
            const g = this._gray(img);

            let pts = this._dither(g);
            if (this.cfg.invert) pts = this._invert(pts, g.w, g.h, g.alpha);

            /* Extract original colors for each particle position */
            const pColors = this._extractColors(pts, g.colors, g.w);

            const sf = Math.max(
              0.5,
              (Math.min(rect.width, rect.height) * this.cfg.scale) /
                Math.max(g.w, g.h),
            );
            const originX = Math.round((rect.width - g.w * sf) / 2);
            const originY = Math.round((rect.height - g.h * sf) / 2);
            const mobile = matchMedia("(max-width:640px)").matches;
            const ds = mobile ? this.cfg.dotScale * 0.8 : this.cfg.dotScale;

            this.sys = this._initParticles(
              pts,
              sf,
              ds,
              originX,
              originY,
              pColors,
            );
            this._loop();
          } catch (err) {
            console.error("DitheredLogo:", err);
          }
        }

        /* ── Physics step ── */
        _step(now) {
          const s = this.sys;
          if (!s) return false;

          for (let i = this.ripples.length - 1; i >= 0; i--)
            if (now - this.ripples[i].t >= RIPPLE_DURATION)
              this.ripples.splice(i, 1);

          const rm =
            this.ripples.length > 0 ? 1 + 0.5 * (this.ripples.length - 1) : 0;
          let motion = false;

          for (let i = 0; i < s.n; i++) {
            let fx = 0,
              fy = 0;

            if (this.cursor.on) {
              const vx = s.bx[i] + s.ox[i] - this.cursor.x;
              const vy = s.by[i] + s.oy[i] - this.cursor.y;
              const d2 = vx * vx + vy * vy;
              if (d2 > 0.1 && d2 < CURSOR_RADIUS_SQ) {
                const d = Math.sqrt(d2);
                const f = (1 - d / CURSOR_RADIUS) ** 3 * CURSOR_FORCE;
                fx += (vx / d) * f;
                fy += (vy / d) * f;
              }
            }

            for (const rip of this.ripples) {
              const el = now - rip.t;
              const rad = (el / 1000) * RIPPLE_SPEED;
              const life = 1 - el / RIPPLE_DURATION;
              const dx = s.bx[i] - rip.x;
              const dy = s.by[i] - rip.y;
              const d = Math.sqrt(dx * dx + dy * dy);
              if (d < 0.1) continue;
              const band = Math.abs(d - rad);
              if (band < RIPPLE_WIDTH) {
                const wf = (1 - band / RIPPLE_WIDTH) * life * RIPPLE_FORCE * rm;
                fx += (dx / d) * wf;
                fy += (dy / d) * wf;
              }
            }

            s.ox[i] += (fx - s.ox[i]) * LERP;
            s.oy[i] += (fy - s.oy[i]) * LERP;
            if (Math.abs(s.ox[i]) < SNAP) s.ox[i] = 0;
            if (Math.abs(s.oy[i]) < SNAP) s.oy[i] = 0;
            if (s.ox[i] || s.oy[i]) motion = true;
          }

          return motion || this.ripples.length > 0 || this.cursor.on;
        }

        /* ── Resolve B&W particle color ── */
        _bwColor() {
          return this.cfg.particleColor === "currentColor"
            ? getComputedStyle(this.el).color
            : this.cfg.particleColor;
        }

        /* ── Draw ── */
        _draw() {
          const s = this.sys;
          if (!s) return;

          const dpr = devicePixelRatio || 1;
          const rect = this.cv.getBoundingClientRect();

          this.cx.clearRect(0, 0, rect.width * dpr, rect.height * dpr);

          const sz = s.sz * dpr;
          const pad = 0.25 * dpr;
          const psz = 0.5 * dpr;

          if (this.monochrome) {
            /* ── B&W: single fill style, all particles ── */
            this.cx.fillStyle = this._bwColor();
            this.cx.globalAlpha = 1;

            for (let i = 0; i < s.n; i++) {
              const x = (s.bx[i] + s.ox[i]) * dpr;
              const y = (s.by[i] + s.oy[i]) * dpr;
              this.cx.fillRect(x - pad, y - pad, sz + psz, sz + psz);
            }
          } else {
            /* ── Color: batched by quantized color ── */
            this.cx.globalAlpha = 1;

            for (const bucket of s.colorBuckets) {
              this.cx.fillStyle = bucket.css;
              const ids = bucket.ids;

              for (let j = 0; j < ids.length; j++) {
                const i = ids[j];
                const x = (s.bx[i] + s.ox[i]) * dpr;
                const y = (s.by[i] + s.oy[i]) * dpr;
                this.cx.fillRect(x - pad, y - pad, sz + psz, sz + psz);
              }
            }
          }
        }

        /* ── Animation loop ── */
        _loop() {
          if (this.running || !this.sys) return;
          this.running = true;

          const tick = (now) => {
            const more = this._step(now);
            this._draw();
            if (more) this.raf = requestAnimationFrame(tick);
            else this.running = false;
          };
          this.raf = requestAnimationFrame(tick);
        }

        /* ── Resize ── */
        _resize() {
          const rect = this.cv.getBoundingClientRect();
          const dpr = devicePixelRatio || 1;
          this.cv.width = Math.max(1, Math.round(rect.width * dpr));
          this.cv.height = Math.max(1, Math.round(rect.height * dpr));
          if (this.sys) this._draw();

          const w = Math.round(rect.width);
          const h = Math.round(rect.height);
          if (this.lw && (w !== this.lw || h !== this.lh)) {
            clearTimeout(this.resizeTimer);
            this.resizeTimer = setTimeout(() => this.rebuild(), 180);
          }
          this.lw = w;
          this.lh = h;
        }

        destroy() {
          cancelAnimationFrame(this.raf);
          this.ro.disconnect();
          this.mo.disconnect();
        }
      }

      /* ═══════ Init ═══════ */
      const logo = new DitheredLogo(
        document.getElementById("ditheredLogo"),
        createDemoImage(),
      );

      /* ── Theme toggle ── */
      document.getElementById("themeToggle").addEventListener("click", () => {
        const html = document.documentElement;
        const next =
          html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        localStorage.setItem("dp-theme", next);
      });

      /* ── B&W / Color toggle ── */
      const bwBtn = document.getElementById("bwBtn");
      const colorBtn = document.getElementById("colorBtn");

      bwBtn.addEventListener("click", () => {
        bwBtn.classList.add("active");
        colorBtn.classList.remove("active");
        logo.setColorMode(false);
      });

      colorBtn.addEventListener("click", () => {
        colorBtn.classList.add("active");
        bwBtn.classList.remove("active");
        logo.setColorMode(true);
      });

      /* ── Upload ── */
      document.getElementById("imagePicker").addEventListener("change", (e) => {
        const f = e.target.files[0];
        if (f) logo.rebuild(URL.createObjectURL(f));
      });
    </script>
  </body>
</html>
