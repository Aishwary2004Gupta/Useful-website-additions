<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dithered Particle Logo</title>

    <style>
      :root {
        --particle-color: #111111;
        --page-background: #f7f7f4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: radial-gradient(
          circle at 50% 30%,
          #ffffff 0%,
          var(--page-background) 62%
        );
        font-family: Arial, sans-serif;
      }

      .demo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .dithered-logo {
        position: relative;
        width: 420px;
        height: 420px;
        color: var(--particle-color);
      }

      .dithered-logo canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
        cursor: pointer;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #333;
        font-size: 14px;
      }

      .controls label {
        padding: 10px 14px;
        border: 1px solid #d5d5d5;
        border-radius: 8px;
        background: white;
        cursor: pointer;
      }

      .controls input {
        display: none;
      }

      @media (max-width: 640px) {
        .dithered-logo {
          width: min(82vw, 330px);
          height: min(82vw, 330px);
        }
      }
    </style>
  </head>
  <body>
    <main class="demo">
      <div class="dithered-logo" id="ditheredLogo">
        <canvas id="particleCanvas"></canvas>
      </div>

      <div class="controls">
        <label>
          Upload image
          <input type="file" id="imagePicker" accept="image/*" />
        </label>
      </div>
    </main>

    <script>
      const IMAGE_SRC = createDemoImage();

      const DEFAULTS = {
        gridSize: 200,
        scale: 0.5,
        dotScale: 1,
        invert: true,
        cornerRadius: 0.2,
        threshold: 180,
        contrast: 0,
        gamma: 1,
        blur: 3.75,
        diffusionStrength: 1,
        serpentine: true,
        particleColor: "currentColor",
      };

      const RIPPLE_SPEED = 225;
      const RIPPLE_WIDTH = 37;
      const RIPPLE_FORCE = 20;
      const RIPPLE_DURATION = 675;

      const CURSOR_RADIUS = 100;
      const CURSOR_RADIUS_SQ = CURSOR_RADIUS * CURSOR_RADIUS;
      const CURSOR_FORCE = 40;

      const LERP_FACTOR = 0.12;
      const SNAP_THRESHOLD = 0.01;

      /* ───────── PEEP-STYLE CHARACTER ───────── */

      function createDemoImage() {
        const svg = `
        <svg xmlns="http://www.w3.org/2000/svg"
             width="800" height="800" viewBox="0 0 800 800">

          <!-- ====== BODY / T-SHIRT ====== -->
          <path fill="#111" d="
            M180 800
            C180 650 235 575 330 535
            L355 525 L355 468
            C355 452 367 445 380 445
            L420 445
            C433 445 445 452 445 468
            L445 525 L470 535
            C565 575 620 650 620 800
            Z
          "/>

          <!-- Sleeve creases -->
          <path fill="none" stroke="#222" stroke-width="3"
                d="M250 650 Q270 640 280 660"/>
          <path fill="none" stroke="#222" stroke-width="3"
                d="M550 650 Q530 640 520 660"/>

          <!-- ====== NECK ====== -->
          <rect x="362" y="420" width="76" height="45" rx="14" fill="#F4C088"/>

          <!-- ====== HEAD ====== -->
          <ellipse cx="400" cy="280" rx="108" ry="135" fill="#F4C088"/>

          <!-- ====== HAIR — Curly / Afro ====== -->
          <!-- Top cluster -->
          <circle cx="400" cy="125" r="62"  fill="#111"/>
          <circle cx="340" cy="138" r="52"  fill="#111"/>
          <circle cx="460" cy="138" r="52"  fill="#111"/>

          <!-- Side clusters -->
          <circle cx="295" cy="178" r="44"  fill="#111"/>
          <circle cx="505" cy="178" r="44"  fill="#111"/>

          <!-- Upper fill -->
          <circle cx="365" cy="100" r="46"  fill="#111"/>
          <circle cx="435" cy="100" r="46"  fill="#111"/>
          <circle cx="400" cy="82"  r="40"  fill="#111"/>

          <!-- Extra volume -->
          <circle cx="310" cy="110" r="36"  fill="#111"/>
          <circle cx="490" cy="110" r="36"  fill="#111"/>
          <circle cx="275" cy="155" r="30"  fill="#111"/>
          <circle cx="525" cy="155" r="30"  fill="#111"/>

          <!-- Hair overlap on forehead -->
          <path fill="#111" d="
            M295 200
            C290 165 310 140 340 130
            C360 124 380 120 400 118
            C420 120 440 124 460 130
            C490 140 510 165 505 200
            C498 175 470 155 440 148
            C420 143 380 143 360 148
            C330 155 302 175 295 200
            Z
          "/>

          <!-- ====== EARS ====== -->
          <ellipse cx="292" cy="300" rx="14" ry="22" fill="#E8B070"/>
          <ellipse cx="508" cy="300" rx="14" ry="22" fill="#E8B070"/>

          <!-- ====== EYEBROWS ====== -->
          <path fill="none" stroke="#111" stroke-width="5"
                stroke-linecap="round"
                d="M340 240 Q355 228 372 236"/>
          <path fill="none" stroke="#111" stroke-width="5"
                stroke-linecap="round"
                d="M460 240 Q445 228 428 236"/>

          <!-- ====== EYES ====== -->
          <!-- White -->
          <ellipse cx="358" cy="270" rx="18" ry="20" fill="#fff"/>
          <ellipse cx="442" cy="270" rx="18" ry="20" fill="#fff"/>

          <!-- Iris -->
          <circle cx="362" cy="274" r="10" fill="#4A3728"/>
          <circle cx="446" cy="274" r="10" fill="#4A3728"/>

          <!-- Pupil -->
          <circle cx="364" cy="276" r="5" fill="#111"/>
          <circle cx="448" cy="276" r="5" fill="#111"/>

          <!-- Highlight -->
          <circle cx="367" cy="269" r="3.5" fill="#fff"/>
          <circle cx="451" cy="269" r="3.5" fill="#fff"/>

          <!-- ====== NOSE ====== -->
          <path fill="#E0A060" d="
            M394 310 Q400 322 406 310
            Q403 316 400 316 Q397 316 394 310
            Z
          "/>

          <!-- ====== MOUTH — Warm smile ====== -->
          <path fill="#C0392B"
                d="M375 345 Q400 375 425 345 Q400 365 375 345 Z"/>

          <!-- Teeth peek -->
          <path fill="#fff"
                d="M383 348 Q400 362 417 348 Q400 357 383 348 Z"/>

          <!-- ====== T-SHIRT COLLAR ====== -->
          <path fill="none" stroke="#F4C088" stroke-width="4"
                stroke-linecap="round"
                d="M362 530 Q400 555 438 530"/>

          <!-- ====== T-SHIRT NECKLINE ====== -->
          <path fill="#222" d="
            M358 525 Q400 550 442 525 Q400 542 358 525 Z
          "/>
        </svg>
      `;

        return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
      }

      /* ───────── DITHERED LOGO CLASS ───────── */

      class DitheredLogo {
        constructor(container, imageSrc, options = {}) {
          this.container = container;
          this.canvas = container.querySelector("canvas");
          this.ctx = this.canvas.getContext("2d");

          this.config = { ...DEFAULTS, ...options };
          this.imageSrc = imageSrc;

          this.system = null;
          this.cursor = { x: 0, y: 0, active: false };
          this.ripples = [];
          this.animationFrame = 0;
          this.running = false;
          this.lastWidth = 0;
          this.lastHeight = 0;

          this.resizeObserver = new ResizeObserver(() => this.handleResize());
          this.resizeObserver.observe(this.container);

          this.bindEvents();
          this.handleResize();
          this.rebuild();
        }

        bindEvents() {
          this.canvas.addEventListener("pointermove", (e) => {
            const r = this.canvas.getBoundingClientRect();
            this.cursor.x = e.clientX - r.left;
            this.cursor.y = e.clientY - r.top;
            this.cursor.active = true;
            this.startLoop();
          });

          this.canvas.addEventListener("pointerleave", (e) => {
            if (e.pointerType === "mouse") {
              this.cursor.active = false;
              this.startLoop();
            }
          });

          this.canvas.addEventListener("pointercancel", () => {
            this.cursor.active = false;
            this.startLoop();
          });

          this.canvas.addEventListener("pointerup", (e) => {
            const r = this.canvas.getBoundingClientRect();
            this.ripples.push({
              x: e.clientX - r.left,
              y: e.clientY - r.top,
              start: performance.now(),
            });
            if (e.pointerType !== "mouse") this.cursor.active = false;
            this.startLoop();
          });
        }

        async rebuild(newSrc = this.imageSrc) {
          this.imageSrc = newSrc;
          try {
            const img = await this.fetchImage(this.imageSrc);
            const rect = this.canvas.getBoundingClientRect();
            const proc = this.toGrayscaleGrid(
              img,
              this.config.gridSize,
              this.config.contrast,
              this.config.gamma,
              this.config.blur,
            );

            let pts = this.errorDiffusionDither(
              proc.grayscale,
              proc.width,
              proc.height,
              {
                threshold: this.config.threshold,
                serpentine: this.config.serpentine,
                diffusionStrength: this.config.diffusionStrength,
              },
              proc.alpha,
            );

            if (this.config.invert) {
              pts = this.applyMaskInversion(
                pts,
                proc.width,
                proc.height,
                this.config.cornerRadius,
                proc.alpha,
              );
            }

            const sf = Math.max(
              0.5,
              (Math.min(rect.width, rect.height) * this.config.scale) /
                Math.max(proc.width, proc.height),
            );
            const ox = Math.round((rect.width - proc.width * sf) / 2);
            const oy = Math.round((rect.height - proc.height * sf) / 2);
            const mobile = window.matchMedia("(max-width:640px)").matches;
            const ds = mobile
              ? this.config.dotScale * 0.8
              : this.config.dotScale;

            this.system = this.initParticles(pts, sf, ds, ox, oy);
            this.startLoop();
          } catch (err) {
            console.error("Image processing failed:", err);
          }
        }

        fetchImage(src) {
          return new Promise((res, rej) => {
            const i = new Image();
            i.crossOrigin = "anonymous";
            i.onload = () => res(i);
            i.onerror = rej;
            i.src = src;
          });
        }

        toGrayscaleGrid(img, maxDim, contrast, gamma, blur) {
          const asp = img.naturalWidth / img.naturalHeight;
          const oW = asp >= 1 ? maxDim : Math.round(maxDim * asp);
          const oH = asp >= 1 ? Math.round(maxDim / asp) : maxDim;

          const ac = document.createElement("canvas");
          ac.width = oW;
          ac.height = oH;
          const ax = ac.getContext("2d");
          ax.imageSmoothingEnabled = true;
          ax.imageSmoothingQuality = "high";
          ax.drawImage(img, 0, 0, oW, oH);
          const ad = ax.getImageData(0, 0, oW, oH).data;

          const pad = Math.ceil(blur * 3);
          const sc = document.createElement("canvas");
          sc.width = img.naturalWidth + pad * 2;
          sc.height = img.naturalHeight + pad * 2;
          const sx = sc.getContext("2d");
          if (blur > 0) sx.filter = `blur(${blur}px)`;
          sx.drawImage(img, pad, pad, img.naturalWidth, img.naturalHeight);
          sx.filter = "none";

          const c = document.createElement("canvas");
          c.width = oW;
          c.height = oH;
          const cx2 = c.getContext("2d");
          cx2.imageSmoothingEnabled = true;
          cx2.imageSmoothingQuality = "high";
          cx2.drawImage(
            sc,
            pad,
            pad,
            img.naturalWidth,
            img.naturalHeight,
            0,
            0,
            oW,
            oH,
          );

          const px = cx2.getImageData(0, 0, oW, oH).data;
          const gs = new Uint8Array(oW * oH);
          const al = new Uint8Array(oW * oH);
          const cf = (259 * (contrast + 255)) / (255 * (259 - contrast));

          for (let y = 0; y < oH; y++)
            for (let x = 0; x < oW; x++) {
              const pi = (y * oW + x) * 4;
              const idx = y * oW + x;
              const ba = px[pi + 3] / 255;
              al[idx] = ad[pi + 3];
              let l =
                ba > 0.01
                  ? (0.299 * px[pi] + 0.587 * px[pi + 1] + 0.114 * px[pi + 2]) /
                    ba
                  : 0;
              if (contrast !== 0) l = cf * (l - 128) + 128;
              if (gamma !== 1)
                l = 255 * Math.pow(Math.max(0, l / 255), 1 / gamma);
              gs[idx] = Math.max(0, Math.min(255, Math.round(l)));
            }

          return { grayscale: gs, alpha: al, width: oW, height: oH };
        }

        errorDiffusionDither(gs, w, h, cfg, alpha) {
          const err = new Float32Array(w * h);
          for (let i = 0; i < gs.length; i++) err[i] = gs[i];
          const pos = [];

          for (let y = 0; y < h; y++) {
            const ltr = !cfg.serpentine || y % 2 === 0;
            const sx = ltr ? 0 : w - 1;
            const ex = ltr ? w : -1;
            const st = ltr ? 1 : -1;

            for (let x = sx; x !== ex; x += st) {
              const idx = y * w + x;
              if (alpha[idx] < 128) continue;
              const ov = err[idx];
              const nv = ov > cfg.threshold ? 255 : 0;
              const e = (ov - nv) * cfg.diffusionStrength;
              if (nv > 0) pos.push(x, y);

              const sp = (nx, ny, wt) => {
                if (nx < 0 || nx >= w || ny < 0 || ny >= h) return;
                const ni = ny * w + nx;
                if (alpha[ni] < 128) return;
                err[ni] += e * wt;
              };

              sp(x + st, y, 7 / 16);
              sp(x - st, y + 1, 3 / 16);
              sp(x, y + 1, 5 / 16);
              sp(x + st, y + 1, 1 / 16);
            }
          }
          return new Float32Array(pos);
        }

        buildRoundedMask(w, h, rp) {
          const r = Math.round(rp * Math.min(w, h));
          const m = new Set();
          for (let y = 0; y < h; y++)
            for (let x = 0; x < w; x++) {
              let ins = false;
              if (x >= r && x < w - r) ins = true;
              else if (y >= r && y < h - r) ins = true;
              else {
                const cx = x < r ? r : w - r - 1;
                const cy = y < r ? r : h - r - 1;
                ins = (x - cx) ** 2 + (y - cy) ** 2 <= r * r;
              }
              if (ins) m.add(y * w + x);
            }
          return m;
        }

        applyMaskInversion(pts, gw, gh, cr, alpha) {
          const mask = this.buildRoundedMask(gw, gh, cr);
          const filled = new Set();
          for (let i = 0; i < pts.length; i += 2)
            filled.add(Math.round(pts[i + 1]) * gw + Math.round(pts[i]));
          const res = [];
          for (const idx of mask)
            if (!filled.has(idx) && alpha[idx] >= 128)
              res.push(idx % gw, Math.floor(idx / gw));
          return new Float32Array(res);
        }

        initParticles(pts, sf, ds, ox, oy) {
          const n = pts.length / 2;
          const bx = new Float32Array(n);
          const by = new Float32Array(n);
          for (let i = 0; i < n; i++) {
            bx[i] = ox + pts[i * 2] * sf;
            by[i] = oy + pts[i * 2 + 1] * sf;
          }
          return {
            count: n,
            baseX: bx,
            baseY: by,
            offsetX: new Float32Array(n),
            offsetY: new Float32Array(n),
            size: sf * ds,
          };
        }

        stepParticles(now) {
          const s = this.system;
          if (!s) return false;
          for (let i = this.ripples.length - 1; i >= 0; i--)
            if (now - this.ripples[i].start >= RIPPLE_DURATION)
              this.ripples.splice(i, 1);

          const rm =
            this.ripples.length > 0 ? 1 + 0.5 * (this.ripples.length - 1) : 0;
          let motion = false;

          for (let i = 0; i < s.count; i++) {
            let fx = 0,
              fy = 0;
            if (this.cursor.active) {
              const vx = s.baseX[i] + s.offsetX[i] - this.cursor.x;
              const vy = s.baseY[i] + s.offsetY[i] - this.cursor.y;
              const d2 = vx * vx + vy * vy;
              if (d2 > 0.1 && d2 < CURSOR_RADIUS_SQ) {
                const d = Math.sqrt(d2);
                const f = (1 - d / CURSOR_RADIUS) ** 3 * CURSOR_FORCE;
                fx += (vx / d) * f;
                fy += (vy / d) * f;
              }
            }
            for (const rip of this.ripples) {
              const el = now - rip.start;
              const rad = (el / 1000) * RIPPLE_SPEED;
              const life = 1 - el / RIPPLE_DURATION;
              const dx = s.baseX[i] - rip.x;
              const dy = s.baseY[i] - rip.y;
              const d = Math.sqrt(dx * dx + dy * dy);
              if (d < 0.1) continue;
              const band = Math.abs(d - rad);
              if (band < RIPPLE_WIDTH) {
                const wf = (1 - band / RIPPLE_WIDTH) * life * RIPPLE_FORCE * rm;
                fx += (dx / d) * wf;
                fy += (dy / d) * wf;
              }
            }
            s.offsetX[i] += (fx - s.offsetX[i]) * LERP_FACTOR;
            s.offsetY[i] += (fy - s.offsetY[i]) * LERP_FACTOR;
            if (Math.abs(s.offsetX[i]) < SNAP_THRESHOLD) s.offsetX[i] = 0;
            if (Math.abs(s.offsetY[i]) < SNAP_THRESHOLD) s.offsetY[i] = 0;
            if (s.offsetX[i] !== 0 || s.offsetY[i] !== 0) motion = true;
          }
          return motion || this.ripples.length > 0 || this.cursor.active;
        }

        getColor() {
          return this.config.particleColor === "currentColor"
            ? getComputedStyle(this.container).color
            : this.config.particleColor;
        }

        drawParticles() {
          const s = this.system;
          if (!s) return;
          const dpr = window.devicePixelRatio || 1;
          const r = this.canvas.getBoundingClientRect();
          this.ctx.clearRect(0, 0, r.width * dpr, r.height * dpr);
          this.ctx.fillStyle = this.getColor();
          this.ctx.globalAlpha = 1;
          const sz = s.size * dpr;
          const p = 0.25 * dpr;
          const ps = 0.5 * dpr;
          for (let i = 0; i < s.count; i++) {
            const x = (s.baseX[i] + s.offsetX[i]) * dpr;
            const y = (s.baseY[i] + s.offsetY[i]) * dpr;
            this.ctx.fillRect(x - p, y - p, sz + ps, sz + ps);
          }
        }

        startLoop() {
          if (this.running || !this.system) return;
          this.running = true;
          const tick = (now) => {
            const more = this.stepParticles(now);
            this.drawParticles();
            if (more) this.animationFrame = requestAnimationFrame(tick);
            else this.running = false;
          };
          this.animationFrame = requestAnimationFrame(tick);
        }

        handleResize() {
          const r = this.canvas.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;
          this.canvas.width = Math.max(1, Math.round(r.width * dpr));
          this.canvas.height = Math.max(1, Math.round(r.height * dpr));
          if (this.system) this.drawParticles();
          const w = Math.round(r.width);
          const h = Math.round(r.height);
          if (
            this.lastWidth !== 0 &&
            (w !== this.lastWidth || h !== this.lastHeight)
          ) {
            clearTimeout(this.resizeTimer);
            this.resizeTimer = setTimeout(() => this.rebuild(), 150);
          }
          this.lastWidth = w;
          this.lastHeight = h;
        }
      }

      /* ───────── INIT ───────── */

      const logo = new DitheredLogo(
        document.getElementById("ditheredLogo"),
        IMAGE_SRC,
        {
          gridSize: 200,
          scale: 0.55,
          dotScale: 1,
          invert: true,
          cornerRadius: 0.15,
          threshold: 180,
          contrast: 0,
          gamma: 1,
          blur: 3.75,
          diffusionStrength: 1,
          serpentine: true,
          particleColor: "currentColor",
        },
      );

      document.getElementById("imagePicker").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        logo.rebuild(URL.createObjectURL(file));
      });
    </script>
  </body>
</html>
